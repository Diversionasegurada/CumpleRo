<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Romeli - Fiesta 🔥</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      font-family: "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1a0b2e, #07010f 70%);
      color:#fff;
      text-align:center;
      overflow:hidden;
      padding:24px;
    }

    .titulo{
      font-size:1.6rem;
      letter-spacing:1px;
      text-transform:uppercase;
      margin:0 0 18px 0;
      line-height:1.3;
    }

    .sub{
      opacity:.85;
      margin:0 0 26px 0;
      font-size:1rem;
    }

    .bomb-btn{
      border:none;
      background:transparent;
      cursor:pointer;
      padding:0;
      outline:none;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      transform: translateZ(0);
    }

    .bomb{
      width:170px;
      height:170px;
      border-radius:999px;
      background: radial-gradient(circle at 30% 30%, #3a3a3a, #0f0f0f 65%);
      position:relative;
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
      animation: pulse 1.6s infinite;
    }

    /* mecha */
    .bomb::before{
      content:"";
      position:absolute;
      width:70px;
      height:18px;
      background: linear-gradient(90deg, #5b3a1d, #c18a46);
      top:-18px;
      left:92px;
      border-radius:12px;
      transform: rotate(-18deg);
      box-shadow:0 6px 16px rgba(0,0,0,.35);
    }

    /* chispa */
    .spark{
      position:absolute;
      top:-48px;
      left:150px;
      width:18px;
      height:18px;
      background: radial-gradient(circle, #fff1a6, #ff8c00 55%, transparent 70%);
      border-radius:999px;
      filter: drop-shadow(0 0 12px rgba(255,140,0,.9));
      animation: spark 0.75s infinite;
    }

    .bomb-label{
      font-size:1.05rem;
      opacity:.9;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      padding:10px 16px;
      border-radius:999px;
      backdrop-filter: blur(6px);
    }

    .hint{
      margin-top:20px;
      font-size:.95rem;
      opacity:.75;
    }

    @keyframes pulse{
      0%{ transform: scale(1); }
      50%{ transform: scale(1.05); }
      100%{ transform: scale(1); }
    }

    @keyframes spark{
      0%{ transform: translate(0,0) scale(1); opacity:1; }
      50%{ transform: translate(-6px,4px) scale(1.15); opacity:.9; }
      100%{ transform: translate(0,0) scale(1); opacity:1; }
    }
  </style>
</head>
<body>
  <h1 class="titulo">¿ESTÁS PREPARADO PARA LA FIESTA?</h1>
  <p class="sub">Tocá la bomba para entrar 🔥🎉</p>

  <button class="bomb-btn" onclick="irATarjeta()" aria-label="Entrar a la tarjeta">
    <div class="bomb">
      <div class="spark"></div>
    </div>
    <div class="bomb-label">💣 HACÉ CLICK ACÁ</div>
  </button>

  <div class="hint">Romeli cumple 41 🥳</div>

  <script>
    function irATarjeta(){
      // Navega a la segunda página
      window.location.href = "tarjeta.html";
    }
  </script>
</body>
</html>
